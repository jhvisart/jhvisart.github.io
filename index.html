<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>VISART | Portafolio Creativo</title>

  <meta name="google" content="notranslate">
  <meta name="description" content="Portafolio creativo de VISART con proyectos visuales, visualizers e interactivos." />

  <link rel="stylesheet" href="style.css">
</head>

<body class="page-home" data-tipo="todos" data-json="data/proyectos.json" data-assets="">
  <div class="bg-grid"></div>

  <header class="header">
    <div class="container header-inner">

      <a href="index.html" class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 100 100" class="v-nav">
            <defs>
              <linearGradient id="vGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="var(--accent1)" />
                <stop offset="100%" stop-color="var(--accent2)" />
              </linearGradient>
            </defs>
            <path d="M10 10 L50 90 L90 10" />
          </svg>
          <canvas class="v-canvas"></canvas>
        </div>

        <div class="brand-text">
          <span>ISART</span>
          <small>Creative Studio</small>
        </div>
      </a>

      <nav class="nav-links">
        <a href="#inicio">Inicio</a>
        <a href="pages/visuales/index.html">Visuales</a>
        <a href="pages/visualizers/index.html">Visualizers</a>
        <a href="pages/interactivos/index.html">Interactivos</a>
        <a href="#sobre-mi">Sobre mí</a>
        <a href="#contacto">Contacto</a>
        <a class="nav-cta" href="#proyectos">Ver trabajos</a>
      </nav>

    </div>
  </header>

  <main>
    <section class="hero" id="inicio">
      <div class="container hero-grid">

        <div class="hero-content">
          <div class="eyebrow">Portafolio visual e interactivo</div>

          <h1>
            Diseños y experiencias <span>creativas</span> con identidad digital.
          </h1>

          <p>
            Bienvenido al espacio creativo de <strong>VISART</strong>.
          </p>

          <div class="hero-actions">
            <a class="btn btn-primary" href="#proyectos">Explorar proyectos</a>
            <a class="btn btn-secondary" href="https://visart.dev" target="_blank">Ver visart.dev</a>
          </div>
        </div>

        <div class="hero-card">
          <div class="hero-visual">
            <video autoplay muted loop playsinline class="bg-video">
              <source src="assets/hero-card.mp4" type="video/mp4">
            </video>
            <canvas id="bgFX"></canvas>
          </div>
        </div>

      </div>
    </section>

    <section class="section featured" id="proyectos">
      <div class="container">
        <div class="section-head">
          <h2>Proyectos destacados</h2>
        </div>

        <div class="projects-grid" id="projects-container"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container footer-line">
      <div>© 2026 <strong>VISART</strong></div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
